<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <title>Youtube - Replicando Layout</title>
  </head>
  <body>
    <header>
      <div class="header-container">
        <button type="button" aria-label="Voltar">
          <i class="bi bi-chevron-left"></i>
        </button>

        <h1>Channel name</h1>

        <div class="header-actions">
          <button type="button" aria-label="Transmitir">
            <i class="material-symbols-outlined">cast</i>
          </button>
          <button type="button" aria-label="Pesquisar">
            <i class="bi bi-search"></i>
          </button>
          <button type="button" aria-label="Mais opções">
            <i class="bi bi-three-dots-vertical"></i>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <img src="" alt="Banner do canal" />
      </section>

      <section class="perfil-info">
        <img
          src=""
          alt="Foto de perfil de Channel Name"
          class="avatar-grande"
        />

        <div class="perfil-textos">
          <h2>Channel name</h2>
          <div class="perfil-p">
            <p>
              Eleifend adipiscing quisque pellentesque lacus pellentesque
              aliquet lacus...
            </p>
            <button type="button" aria-label="Ver descrição completa">
              <i class="bi bi-chevron-right"></i>
            </button>
          </div>
          <button type="button" class="btn-subscribe">Subscribe</button>
        </div>
      </section>

      <nav class="nav-interna">
        <ul>
          <li><a href="#">HOME</a></li>
          <li><a href="#">VIDEOS</a></li>
          <li><a href="#">SHORTS</a></li>
          <li><a href="#">LIVE</a></li>
        </ul>
      </nav>

      <section class="video-feed">
        <article class="box-video">
          <img class="thumbnail" src="" alt="Capa do vídeo" />
          <div class="video-details">
            <img class="perfil-canal-miniatura" src="" alt="" />
            <div class="video-text">
              <h3>Video title</h3>
              <p>Channel name • 228K views • 3 weeks ago</p>
            </div>
            <button type="button" aria-label="Opções do vídeo">
              <i class="bi bi-three-dots-vertical"></i>
            </button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
